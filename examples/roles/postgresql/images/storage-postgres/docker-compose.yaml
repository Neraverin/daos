version: "3.6"

services:
    storage-postgres:
        read_only: true
        env_file:
            - "./config/default.env"
            - "./config/custom.env"
        image: ${REGISTRY}/storage-postgres:4.0.4
        container_name: ${CONTAINER_NAME}
        ports:
            - "${PG_PORT}:5432"
        restart: always
        networks:
            - default
        volumes:
            - ${PG_LOG}:/var/lib/postgresql/log
            - ${PG_DATA}:/var/lib/postgresql/data
            - ${PG_CERTS}:/var/lib/postgresql/certs:ro
        tmpfs:
            - /var/run/postgresql:mode=777,uid=${DOCKER_UID},gid=${DOCKER_GID}
        shm_size: "8gb"
        stop_grace_period: 1m

networks:
    default:
        name: ${NETWORK}
        driver: ${NETWORK_DRIVER}
